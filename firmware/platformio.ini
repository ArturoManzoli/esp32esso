; esp32esso firmware - PlatformIO project
;
; Build environments map 1:1 to a (board, machine-profile) pair. The board
; sets the chip + GPIO map (via ESP32ESSO_BOARD_*); the profile sets the
; machine's thermal/hydraulic config (via ESP32ESSO_PROFILE_*).
;
; Regular ESP32 (WROOM) is the primary Tier 1 target, so `esp32-dev` is the
; default env. The ESP32-S3 envs build the same firmware for users who move
; up to an S3 for the Tier 2-4 roadmap (BLE, profiling, OTA).
;
; Env naming: `esp32-*` = classic ESP32, `esp32-s3-*` = ESP32-S3. The Oster
; envs default to dual thermocouples (recommended); the `*-ntc` suffix selects
; the alternative build that reuses the stock NTC thermistor on the thermoblock.

[platformio]
default_envs = esp32-dev
src_dir = src

[env]
platform = espressif32@^6.7.0
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -Wno-unused-parameter
    -Isrc
build_unflags =
    -std=gnu++11

[env:esp32-dev]
board = esp32dev
build_flags =
    ${env.build_flags}
    -DESP32ESSO_BOARD_WROOM=1
    -DESP32ESSO_PROFILE_STUB=1

; Oster Xpert, classic ESP32-WROOM. The default `esp32-oster-xpert` env is the
; recommended **dual-thermocouple** cascade: a thermocouple on the thermoblock
; (the same MAX6675 probe as Tier 1, on CS 21) plus a second, identical
; thermocouple at the group (CS 22). Two thermocouples is the better setup --
; linear, cold-junction-compensated, no per-unit resistance fit, and far less
; drift than the stock NTC. The `-ntc` variant keeps the older option of reusing
; the machine's stock 100 k NTC on the thermoblock (see ESP32ESSO_THERMOBLOCK_NTC)
; for people who would rather use the "free" stock sensor; in that build the
; single group thermocouple stays on CS 21.
[env:esp32-oster-xpert]
board = esp32dev
build_flags =
    ${env.build_flags}
    -DESP32ESSO_BOARD_WROOM=1
    -DESP32ESSO_PROFILE_OSTER_XPERT=1
    -DESP32ESSO_TIER1_BLE=1
    -DESP32ESSO_TIER2=1
    -DESP32ESSO_THERMOCOUPLE_MAX6675=1
    -DESP32ESSO_PRESSURE_ADC=1

[env:esp32-oster-xpert-ntc]
board = esp32dev
build_flags =
    ${env.build_flags}
    -DESP32ESSO_BOARD_WROOM=1
    -DESP32ESSO_PROFILE_OSTER_XPERT=1
    -DESP32ESSO_TIER1_BLE=1
    -DESP32ESSO_TIER2=1
    -DESP32ESSO_THERMOCOUPLE_MAX6675=1
    -DESP32ESSO_THERMOBLOCK_NTC=1
    -DESP32ESSO_PRESSURE_ADC=1

[env:esp32-s3-dev]
board = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -DESP32ESSO_BOARD_S3=1
    -DESP32ESSO_PROFILE_STUB=1

; Oster Xpert, ESP32-S3. Same story as the WROOM envs, but the S3 build reads
; MAX31855 amps (wider range + open/short fault flags). The default is the
; recommended dual-thermocouple cascade (thermoblock on CS 10, group on CS 11);
; the `-ntc` variant reuses the stock NTC on the thermoblock and keeps the single
; group thermocouple on CS 10.
[env:esp32-s3-oster-xpert]
board = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -DESP32ESSO_BOARD_S3=1
    -DESP32ESSO_PROFILE_OSTER_XPERT=1
    -DESP32ESSO_TIER1_BLE=1
    -DESP32ESSO_TIER2=1
    -DESP32ESSO_PRESSURE_ADC=1

[env:esp32-s3-oster-xpert-ntc]
board = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -DESP32ESSO_BOARD_S3=1
    -DESP32ESSO_PROFILE_OSTER_XPERT=1
    -DESP32ESSO_TIER1_BLE=1
    -DESP32ESSO_TIER2=1
    -DESP32ESSO_THERMOBLOCK_NTC=1
    -DESP32ESSO_PRESSURE_ADC=1
