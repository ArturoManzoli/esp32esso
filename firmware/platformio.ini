; esp32esso firmware - PlatformIO project
;
; Build environments map 1:1 to a (board, machine-profile) pair. The board
; sets the chip + GPIO map (via ESP32ESSO_BOARD_*); the profile sets the
; machine's thermal/hydraulic config (via ESP32ESSO_PROFILE_*).
;
; Regular ESP32 (WROOM) is the primary Tier 1 target, so `esp32-dev` is the
; default env. The ESP32-S3 envs build the same firmware for users who move
; up to an S3 for the Tier 2-4 roadmap (BLE, profiling, OTA).
;
; Env naming: `esp32-*` = classic ESP32, `esp32-s3-*` = ESP32-S3.

[platformio]
default_envs = esp32-dev
src_dir = src

[env]
platform = espressif32@^6.7.0
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -Wno-unused-parameter
    -Isrc
build_unflags =
    -std=gnu++11

[env:esp32-dev]
board = esp32dev
build_flags =
    ${env.build_flags}
    -DESP32ESSO_BOARD_WROOM=1
    -DESP32ESSO_PROFILE_STUB=1

[env:esp32-oster-xpert]
board = esp32dev
build_flags =
    ${env.build_flags}
    -DESP32ESSO_BOARD_WROOM=1
    -DESP32ESSO_PROFILE_OSTER_XPERT=1
    -DESP32ESSO_TIER1_BLE=1

[env:esp32-s3-dev]
board = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -DESP32ESSO_BOARD_S3=1
    -DESP32ESSO_PROFILE_STUB=1

[env:esp32-s3-oster-xpert]
board = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -DESP32ESSO_BOARD_S3=1
    -DESP32ESSO_PROFILE_OSTER_XPERT=1
    -DESP32ESSO_TIER1_BLE=1
