; esp32esso firmware - PlatformIO project
;
; Build environments map 1:1 to a (board, machine-profile) pair. A bare
; "dev" env exists for skeleton work and CI sanity, and a per-machine env
; is added when that machine's profile lands (esp32-s3-oster-xpert is the
; first concrete one).

[platformio]
default_envs = esp32-s3-dev
src_dir = src

[env]
platform = espressif32@^6.7.0
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, time
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -Wno-unused-parameter
    -Isrc
build_unflags =
    -std=gnu++11

[env:esp32-s3-dev]
board = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -DESP32ESSO_PROFILE_STUB=1

[env:esp32-s3-oster-xpert]
board = esp32-s3-devkitc-1
build_flags =
    ${env.build_flags}
    -DESP32ESSO_PROFILE_OSTER_XPERT=1
